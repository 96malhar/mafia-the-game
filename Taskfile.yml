# Taskfile for the Mafia game.
# https://taskfile.dev
#
# Install task: `brew install go-task` (macOS) or see https://taskfile.dev/installation
# Run `task --list` to see available tasks.

version: "3"

vars:
  BIN_DIR: bin
  BINARY: "{{.BIN_DIR}}/server"
  PKG: ./...
  MAIN: ./cmd/server
  COVER_FILE: coverage.out
  IMAGE: mafia-the-game

env:
  CGO_ENABLED: "1" # required for -race

tasks:
  run:
    desc: Start the dev server (ADDR=:8080 by default).
    cmds:
      - go run {{.MAIN}}

  sim:
    desc: Run a scripted bot game against a running server. Start `task run` in another shell first.
    # Bots open WebSockets to ${ADDR:-:8080}, so the same env var that
    # `run` and `stop` honour applies here too.
    cmds:
      - go run ./cmd/sim -addr "http://localhost${ADDR:-:8080}" {{.CLI_ARGS}}

  stop:
    desc: Stop the dev server (ADDR=:8080 by default). Sends SIGTERM, then SIGKILL after 5s.
    # We target the listening socket rather than a process name so this
    # works whether the server was started via `task run` or
    # `./bin/server`. Respects $ADDR like `run` does.
    cmds:
      - |
        addr="${ADDR:-:8080}"
        port="${addr#*:}"
        pids=$(lsof -ti tcp:"$port" -sTCP:LISTEN 2>/dev/null || true)
        if [ -z "$pids" ]; then
          echo "no process listening on port $port"
          exit 0
        fi
        echo "stopping server on port $port (pids: $pids)"
        kill $pids 2>/dev/null || true
        # Wait up to 5s for graceful shutdown; main.go has its own 10s
        # window but we don't want to block the dev loop that long.
        for i in 1 2 3 4 5; do
          sleep 1
          still=$(lsof -ti tcp:"$port" -sTCP:LISTEN 2>/dev/null || true)
          [ -z "$still" ] && exit 0
        done
        echo "graceful stop timed out; sending SIGKILL"
        kill -9 $still 2>/dev/null || true

  build:
    desc: Build a release binary to bin/server.
    cmds:
      - mkdir -p {{.BIN_DIR}}
      - go build -trimpath -ldflags="-s -w" -o {{.BINARY}} {{.MAIN}}
    sources:
      - "**/*.go"
      - go.mod
      - go.sum
    generates:
      - "{{.BINARY}}"

  docker:build:
    desc: Build the production Docker image (tag with TAG=..., default 'latest').
    # Stamp main.version from git so local images report a real version
    # (falls back to the short SHA, or "dev" outside a git checkout).
    vars:
      VERSION:
        sh: git describe --tags --always --dirty 2>/dev/null || echo dev
    cmds:
      - docker build --build-arg VERSION={{.VERSION}} -t {{.IMAGE}}:{{.TAG | default "latest"}} .

  docker:run:
    desc: Run the production image, publishing PORT (default 8080) to the container.
    # Depends on docker:build so the image is fresh. Override the host
    # port with PORT and pass extra `docker run` flags via CLI_ARGS, e.g.
    # `task docker:run PORT=9000 -- -e LOG_LEVEL=debug`.
    deps:
      - docker:build
    cmds:
      - docker run --rm -p {{.PORT | default "8080"}}:8080 {{.CLI_ARGS}} {{.IMAGE}}:{{.TAG | default "latest"}}

  test:
    desc: Run all tests with the race detector.
    cmds:
      - go test -race -count=1 {{.PKG}}

  test:cover:
    desc: Run tests and open an HTML coverage report.
    cmds:
      - go test -race -coverprofile={{.COVER_FILE}} {{.PKG}}
      - go tool cover -html={{.COVER_FILE}}

  bench:
    desc: Run benchmarks.
    cmds:
      - go test -bench=. -benchmem -run=^$ {{.PKG}}

  tidy:
    desc: Sync go.mod / go.sum.
    cmds:
      - go mod tidy

  fmt:
    desc: Format Go source. Uses goimports if available, otherwise gofmt.
    cmds:
      - |
        if command -v goimports >/dev/null 2>&1; then
          goimports -w -local github.com/malhar/mafia-the-game .
        else
          gofmt -s -w .
        fi

  vet:
    desc: Run `go vet`.
    cmds:
      - go vet {{.PKG}}

  lint:
    desc: Run golangci-lint (install with `task tools` if missing).
    cmds:
      - |
        if ! command -v golangci-lint >/dev/null 2>&1; then
          echo "golangci-lint not found. Run 'task tools' to install it."
          exit 1
        fi
        golangci-lint run

  vuln:
    desc: Scan dependencies for known vulnerabilities via govulncheck.
    # Requires network access to fetch the vuln DB from vuln.go.dev.
    # Kept out of `task check` so the fast local loop stays offline-
    # friendly; included in `task ci` for merge-gate scans.
    cmds:
      - |
        if ! command -v govulncheck >/dev/null 2>&1; then
          echo "govulncheck not found. Run 'task tools' to install it."
          exit 1
        fi
        govulncheck ./...

  check:
    desc: Fast pre-commit gate — fmt, vet, lint, test. Offline-friendly.
    cmds:
      - task: fmt
      - task: vet
      - task: lint
      - task: test

  ci:
    desc: Full CI pipeline — everything in `check` plus a vulnerability scan.
    cmds:
      - task: check
      - task: vuln

  tools:
    desc: Install/refresh dev tools (goimports, golangci-lint, govulncheck).
    cmds:
      - go install golang.org/x/tools/cmd/goimports@latest
      - go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
      - go install golang.org/x/vuln/cmd/govulncheck@latest

  clean:
    desc: Remove build and coverage artifacts.
    cmds:
      - rm -rf {{.BIN_DIR}} {{.COVER_FILE}}
