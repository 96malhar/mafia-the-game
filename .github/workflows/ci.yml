name: CI

# Runs the same gate developers run locally via `task ci`
# (fmt, vet, lint, test with -race, and a govulncheck scan).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Allow running the workflow on demand from the Actions tab.
  workflow_dispatch:
  # Allow other workflows (e.g. release) to run this gate before publishing.
  workflow_call:

# Cancel superseded runs on the same ref so a fresh push doesn't wait
# behind an outdated in-flight run.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Go version is read from go.mod so CI tracks the toolchain the
      # module declares; setup-go also caches the build/module cache.
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Task
        uses: go-task/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      # Node + jsdom back the frontend tests that run inside `task ci`
      # (task check -> task test:web). Without this step test:web skips
      # itself; with it the frontend suite gates alongside the Go tests.
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install frontend test deps
        run: npm ci

      # goimports / golangci-lint / govulncheck — required by the lint
      # and vuln steps inside `task ci`.
      - name: Install dev tools
        run: task tools

      - name: Run CI checks
        run: task ci

  # Validate the production image actually builds and boots: this is the
  # only check that exercises the multi-stage Dockerfile, the distroless
  # runtime, the non-root user, and the web/ asset path — things the Go
  # unit tests can't cover. Delegates to `task docker:smoke` so local runs
  # and CI exercise the identical build + /healthz probe.
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Task
        uses: go-task/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image and smoke test /healthz
        run: task docker:smoke
