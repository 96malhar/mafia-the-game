          // in-game view they can't escape.
          if (pendingRejoinCode) {
            const stale = pendingRejoinCode;
            pendingRejoinCode = null;
            recoverToLobby(stale, "Could not reconnect — the room may be closed.");
            return;
          }
          // Symmetric guard for first-time joins: socket died before
          // the server acked. Most likely the server is unreachable
          // (the alternative — an "error" frame — is handled above and
          // detaches this handler before close fires).
          if (pendingJoinCode) {
            const stale = pendingJoinCode;
            pendingJoinCode = null;
            recoverToLobby(stale, "Could not connect — the server may be unreachable.");
            return;
          }
          setStatus("disconnected", "text-rose-400");
        };
        ws.onerror = () => setStatus("connection error", "text-rose-400");
      }

      // ----- lobby actions ------------------------------------------------

      // Both actions need a name. We gate the buttons rather than
      // popping an alert; the disabled state makes the requirement
      // visible at a glance.
      function currentName() {
        return $("name").value.trim();
      }

      function refreshLobbyButtons() {
        const hasName = currentName().length > 0;
        const fromLink = roomFromURL();
        $("create").disabled = !hasName;
        $("join").disabled = !hasName || !fromLink;
      }

      async function createRoom() {
        const name = currentName();
        if (!name) return;
        setStatus("creating room…", "text-slate-300");
        try {
          const res = await fetch("/api/rooms", { method: "POST" });
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const { code } = await res.json();
          // Reflect the new room in the address bar so a reload of
          // THIS tab keeps the same target room, and a copy-paste of
          // the address bar URL is also a valid invite.
          history.replaceState(null, "", shareLinkFor(code));
          connect(code, name, null);
        } catch (e) {
          setStatus(`could not create: ${e.message}`, "text-rose-400");
        }
      }

      function joinRoom(code) {
        const name = currentName();
        if (!name || !code) return;
        const stored = sessionStorage.getItem(storageKey(code));
        const creds = stored ? JSON.parse(stored) : null;
        connect(code, name, creds);
      }

      // ----- URL-driven lobby setup ---------------------------------------

      // recoverToLobby restores the pre-game lobby view after an
      // auto-rejoin attempt failed (typically: server restart cleared
      // the room, or stored credentials are stale). It assumes the
      // game view was never shown (we caught the error before
      // "joined" / "rejoined" arrived).
      function recoverToLobby(code, note) {
        $("game").classList.add("hidden");
        $("lobby").classList.remove("hidden");
        // If a code is given, keep the URL pointed at that room so
        // applyURLState() formats the lobby as "Join room ZMPP"
        // (used by the rejoin-failed paths — the user still wants to
        // try this specific room). Passing null clears the URL so
        // the lobby reverts to the generic "Start a game" view with
        // the Create button visible — used when the target room is
        // unjoinable and re-attempting would just fail again.
        history.replaceState(null, "", code ? shareLinkFor(code) : "/");
        applyURLState();
        setStatus(note, "text-amber-400");
      }

      // tryAutoRejoin runs at page load. If the URL carries a room
      // code AND sessionStorage has matching rejoin credentials, we
      // open a WebSocket immediately and let the server replay the
      // event log — the user never sees the lobby. Returns true if a
      // rejoin attempt was launched.
      function tryAutoRejoin() {
        const code = roomFromURL();
        if (!code) return false;
        const stored = sessionStorage.getItem(storageKey(code));
        if (!stored) return false;
        let creds;
        try { creds = JSON.parse(stored); }
        catch { sessionStorage.removeItem(storageKey(code)); return false; }
        if (!creds || !creds.playerId || !creds.secret) {
          sessionStorage.removeItem(storageKey(code));
          return false;
        }
        pendingRejoinCode = code;
        setStatus(`reconnecting to ${code}…`, "text-slate-300");
        // The server takes name from its own roster on rejoin, so
        // we pass null for the name argument.
        connect(code, null, creds);
        return true;
      }

      function applyURLState() {
        const fromLink = roomFromURL();
        if (fromLink) {
          // Visitor came from a share link. Make joining the obvious
          // action; hide Create so they don't accidentally spawn a
          // second room.
          $("lobby-title").textContent = `Join room ${fromLink}`;
          $("lobby-subtitle").textContent = "Pick a name to join.";
          $("join-code").textContent = fromLink;
          $("join").classList.remove("hidden");
          $("create").classList.add("hidden");
        } else {
          $("lobby-title").textContent = "Start a game";
          $("lobby-subtitle").textContent = "Pick a name. Create a room or join one via a share link.";
          $("join").classList.add("hidden");
          $("create").classList.remove("hidden");
        }
        refreshLobbyButtons();
      }

      // ----- wiring -------------------------------------------------------

      $("name").addEventListener("input", refreshLobbyButtons);
      $("name").addEventListener("keydown", (e) => {
        if (e.key !== "Enter") return;
        if (roomFromURL()) joinRoom(roomFromURL());
        else createRoom();
      });

      $("create").addEventListener("click", createRoom);
      $("join").addEventListener("click", () => joinRoom(roomFromURL()));

      $("manual-join").addEventListener("click", () => {
        const code = $("manual-code").value.trim().toUpperCase();
        if (code) joinRoom(code);
      });

      // Detective modal dismissal: the button, clicking the dimmed
      // overlay (but not the card), and Escape all close it.
      $("detective-modal-dismiss").addEventListener("click", hideDetectiveToast);
      $("detective-modal").addEventListener("click", (e) => {
        if (e.target.id === "detective-modal") hideDetectiveToast();
      });
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") {
          const m = $("detective-modal");
          if (m && !m.classList.contains("hidden")) hideDetectiveToast();
        }
      });

      $("copy-link").addEventListener("click", async () => {
        const url = $("share-url").textContent;
        const btn = $("copy-link");
        const original = btn.textContent;
        try {
          await navigator.clipboard.writeText(url);
          btn.textContent = "Copied!";
        } catch {
          // Clipboard API can be unavailable (http on a LAN IP, older
          // browsers). Fall back to selecting the text so the user can
          // Cmd/Ctrl-C it themselves.
          const range = document.createRange();
          range.selectNodeContents($("share-url"));
          const sel = window.getSelection();
          sel.removeAllRanges();
          sel.addRange(range);
          btn.textContent = "Select & copy";
        }
        setTimeout(() => { btn.textContent = original; }, 1500);
      });

      // On page load: if the URL has ?room= AND sessionStorage has
      // rejoin credentials for that room, reconnect silently. Only
      // show the lobby if there's nothing to rejoin to. This is what
      // makes a tab refresh a no-op from the player's perspective.
      if (!tryAutoRejoin()) {
        applyURLState();
      }

      // Quick health probe to confirm the server is up before anyone clicks.
      (async () => {
        try {
          const res = await fetch("/healthz");
          setStatus(res.ok ? "server ready" : `server status ${res.status}`,
            res.ok ? "text-slate-400" : "text-amber-400");
        } catch (err) {
          setStatus(`server unreachable (${err.message})`, "text-rose-400");
        }
      })();
    </script>
  </body>
</html>
