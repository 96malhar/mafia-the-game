# fly.io configuration for the Mafia game server.
#
# First-time setup:   fly launch --no-deploy   (edit app/region as needed)
# Deploy:             fly deploy
#
# IMPORTANT: this app keeps all room state IN MEMORY in a single process.
# It must run as exactly ONE machine. Scaling to multiple machines would
# split rooms across processes and break games, since fly's proxy has no
# sticky-by-room routing here. Keep min/max at 1.

app = "mafia-the-game"          # change to your globally-unique app name
primary_region = "sjc"          # change to your nearest region

[build]
  # Builds from the repo Dockerfile (static binary + distroless runtime).
  dockerfile = "Dockerfile"

[env]
  ADDR = ":8080"
  LOG_LEVEL = "info"
  # Structured logs to stdout; `fly logs` streams them.
  LOG_FORMAT = "json"
  # Labels exported metrics with deployment.environment (target_info).
  DEPLOY_ENV = "production"
  # fly's edge forwards the real client IP in this header; trust it so
  # access logs and the room-create rate limiter key on the real client
  # rather than fly's internal proxy address.
  TRUSTED_CLIENT_IP_HEADER = "Fly-Client-IP"
  # Per-IP cap on POST /api/rooms so one client can't churn through the
  # server's room capacity.
  ROOM_CREATE_RPM = "30"
  # Cap the Go heap below the 512 MB machine limit so the GC stays tight near
  # the ceiling and the app DEGRADES (more frequent GC) instead of being
  # OOM-killed by Fly. Critical for a single instance that can't scale out.
  GOMEMLIMIT = "450MiB"
  # Origin checking is ON by default and same-origin (https://<app>.fly.dev)
  # already passes. Uncomment to allow additional origins (e.g. a custom
  # domain):
  # ALLOWED_ORIGINS = "mafia-the-game.fly.dev,play.example.com"

# Fly's managed Prometheus scrapes this endpoint over the PRIVATE 6PN
# network; view the series in Fly's hosted Grafana at
# https://fly-metrics.net (or `fly dashboard metrics`). The app serves
# /metrics on a dedicated port (9091) that is deliberately NOT listed
# under [http_service] below — so the public proxy never routes to it
# and the metrics (http_server_*, room_active, ws_connections_active,
# the rejection counters) are unreachable from the internet.
[metrics]
  port = 9091
  path = "/metrics"

[http_service]
  internal_port = 8080
  # Redirect http -> https at the edge; clients then use wss:// for the
  # WebSocket, while this app keeps listening on plain HTTP internally.
  force_https = true
  # Stateful single instance: never auto-stop (that would drop every live
  # game) and always keep one machine warm.
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  # WebSocket connections are long-lived, so meter by open connections
  # rather than requests. Since this app can't scale out (single in-memory
  # instance, no sticky-by-room routing), hard_limit is the absolute cap on
  # concurrent players — the proxy refuses new connections beyond it. Sized
  # for shared-cpu-1x / 512 MB: ~1000 players is ~115 MB (well under
  # GOMEMLIMIT) and only ~a few % of a core on average at this game's low
  # message rate; soft_limit sits below as a headroom band. The in-process
  # RLIMIT_NOFILE raise (see main.go) removes the ~1k fd-default wall, so this
  # is bound by CPU/memory now. Going much past ~1000-1500 risks burst-latency
  # jitter on the shared CPU — validate fly_instance_cpu under load first, or
  # move to a performance VM. Keep DefaultMaxRooms in sync.
  [http_service.concurrency]
    type = "connections"
    soft_limit = 800
    hard_limit = 1000

  # Liveness/readiness probe against the built-in endpoint.
  [[http_service.checks]]
    method = "GET"
    path = "/healthz"
    interval = "15s"
    timeout = "2s"
    grace_period = "5s"

# Machine size. The server is a single lightweight Go process (rooms in
# memory, no DB), so the smallest shared CPU is plenty; 512 MB leaves
# comfortable headroom for WebSocket connection buffers and GC. Bump
# memory (or move to performance-* CPUs) only if the fly_instance_memory_*
# / fly_instance_cpu metrics show pressure. Resize live with:
#   fly scale vm shared-cpu-1x --memory 512 -a mafia-the-game
[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
