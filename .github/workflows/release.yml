name: Release

# Cut a release on demand. main can accumulate any number of commits;
# when you want to ship, run this from the Actions tab: pick the branch
# to release from and enter the version tag (vX.Y.Z). The workflow then:
#   1. stamps the version into the binary (main.version via -ldflags),
#   2. builds and pushes a GHCR image tagged :<version> and :latest,
#   3. creates the git tag and a GitHub Release with generated notes.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version tag (semver, e.g. v1.2.3)"
        required: true

permissions:
  contents: write # create the git tag + GitHub Release
  packages: write # push the image to GHCR

# Never let two releases run at once, and never cancel one mid-publish.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # Re-run the full local gate (fmt/vet/lint/test -race/govulncheck) against
  # the branch being released. release depends on this, so a red gate blocks
  # the image push, tag, and GitHub Release.
  ci:
    uses: ./.github/workflows/ci.yml

  release:
    needs: ci
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ inputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # full history + tags for the guard and release notes

      - name: Validate version and guard against existing tag
        run: |
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.]+)?$ ]]; then
            echo "::error::version '$VERSION' must be semver vX.Y.Z (optionally -prerelease)"
            exit 1
          fi
          if git rev-parse "refs/tags/$VERSION" >/dev/null 2>&1; then
            echo "::error::tag $VERSION already exists"
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags + OCI labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          # The git tag/release keep the leading `v` (vX.Y.Z); image tags
          # follow Docker convention and drop it. `type=semver` strips the
          # `v` and emits rolling 1.2.3 / 1.2 / 1 tags. The explicit
          # `value=` overrides the (branch) ref so it works on dispatch.
          tags: |
            type=semver,pattern={{version}},value=${{ inputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ inputs.version }}
            type=semver,pattern={{major}},value=${{ inputs.version }}
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ inputs.version }}
          # Attach a signed SLSA provenance attestation and an SBOM to the
          # pushed image (visible/verifiable from GHCR).
          provenance: true
          sbom: true

      # Publish only after the image is live, so a failed build never
      # leaves a dangling tag/release. gh creates the tag at this commit.
      - name: Create tag and GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$VERSION" \
            --target "${{ github.sha }}" \
            --title "$VERSION" \
            --generate-notes
