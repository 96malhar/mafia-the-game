<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!--
      viewport-fit=cover tells iOS Safari to extend the layout under
      notches / the dynamic island; we then opt INTO safe areas
      explicitly on the body via env(safe-area-inset-*). Without
      viewport-fit=cover the safe-area values are 0.
    -->
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <!--
      Theme color tints the iOS Safari toolbar / Android nav to match
      the app background, so the chrome blends in rather than
      sandwiching the dark UI between two white bars.
    -->
    <meta name="theme-color" content="#0f172a" />
    <title>Mafia</title>
    <!--
      Explicit icon links: browsers use these and skip the default
      implicit GET /favicon.ico (which 404s, since we don't ship one).
      apple-touch-icon is used when added to an iOS home screen.
    -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /*
       * iOS Safari respects env(safe-area-inset-*) only when we use
       * it explicitly. Apply it as padding on <body> so every
       * descendant gets a visual breathing room from the notch /
       * home indicator without each component needing to opt in.
       *
       * Using max(env(...), 0px) is the safe pattern for browsers
       * that don't understand env(): they parse it as max(0px) = 0,
       * which matches the desktop default.
       */
      body {
        padding-top: max(env(safe-area-inset-top), 0px);
        padding-bottom: max(env(safe-area-inset-bottom), 0px);
        padding-left: max(env(safe-area-inset-left), 0px);
        padding-right: max(env(safe-area-inset-right), 0px);
      }
      /*
       * touch-manipulation kills the iOS Safari 300ms tap delay on
       * elements that don't need double-tap-to-zoom (every button
       * in this app). Set globally so we don't have to remember it
       * per-button.
       */
      button, [role="button"], a {
        touch-action: manipulation;
      }
    </style>
  </head>
  <body class="min-h-screen bg-slate-900 text-slate-100 antialiased">
    <main class="mx-auto flex min-h-screen max-w-3xl flex-col px-4 py-6 sm:px-6 sm:py-10">
      <header class="mb-6 flex items-baseline justify-between gap-3">
        <h1 class="text-3xl font-bold tracking-tight sm:text-4xl">Mafia</h1>
        <p id="status" class="shrink-0 text-sm text-slate-400">offline</p>
      </header>

      <!--
        Lobby = pre-game landing screen.
        One name input drives BOTH actions. When the URL carries
        ?room=ZMPP we hide "Create" and surface a big "Join ZMPP" CTA,
        because at that point the user clearly came from a share link.
      -->
      <section id="lobby" class="space-y-4 rounded-lg border border-slate-700 bg-slate-800/40 p-6">
        <h2 id="lobby-title" class="text-lg font-semibold">Start a game</h2>
        <p id="lobby-subtitle" class="text-sm text-slate-400">Pick a name. Create a room or join one via a share link.</p>

        <div class="flex flex-col gap-2">
          <label class="text-xs uppercase tracking-wide text-slate-400" for="name">Your name</label>
          <!--
            text-base (16px) is REQUIRED on inputs to suppress iOS
            Safari's auto-zoom on focus. Anything smaller and the
            viewport zooms in mid-game and never zooms out. Same
            reasoning applies to #manual-code below.
          -->
          <input id="name" class="min-h-[44px] rounded border border-slate-700 bg-slate-900 px-3 py-2 text-base"
                 placeholder="Alice" autocomplete="off" maxlength="32" />
        </div>

        <div id="lobby-actions" class="flex flex-col gap-2 sm:flex-row sm:gap-3">
          <button id="create"
                  class="inline-flex min-h-[44px] items-center justify-center rounded bg-emerald-600 px-4 py-2 font-medium hover:bg-emerald-500 disabled:cursor-not-allowed disabled:opacity-50"
                  disabled>
            Create new room
          </button>
          <button id="join"
                  class="hidden min-h-[44px] inline-flex items-center justify-center rounded bg-indigo-600 px-4 py-2 font-medium hover:bg-indigo-500 disabled:cursor-not-allowed disabled:opacity-50"
                  disabled>
            Join room <span id="join-code" class="ml-1 font-mono">----</span>
          </button>
        </div>

        <details class="text-sm text-slate-400">
          <summary class="cursor-pointer select-none py-1">Join by code instead</summary>
          <div class="mt-2 flex gap-2">
            <input id="manual-code"
                   class="min-h-[44px] flex-1 rounded border border-slate-700 bg-slate-900 px-3 py-2 text-base font-mono uppercase tracking-widest"
                   placeholder="ABCD" maxlength="4" autocomplete="off" />
            <button id="manual-join"
                    class="inline-flex min-h-[44px] items-center justify-center rounded bg-slate-700 px-4 py-2 hover:bg-slate-600">Go</button>
          </div>
        </details>
      </section>

      <!-- In-game view -->
      <section id="game" class="mt-6 hidden space-y-4">
        <!--
          Share strip: visible only while the room is still
          accepting joins (i.e. lobby BEFORE roles are dealt). The
          server rejects AddPlayer the moment StartGame runs, so
          continuing to show an invite would be a UI lie. The
          renderInviteBanner() function in JS toggles `hidden`
          based on rolesDealt — keep this initial state visible
          so the lobby's first paint doesn't flash.
        -->
        <div id="invite-banner"
             class="flex flex-col gap-2 rounded border border-emerald-700/60 bg-emerald-900/20 p-4 sm:flex-row sm:items-center sm:justify-between">
          <div class="min-w-0">
            <div class="text-xs uppercase tracking-wide text-emerald-300">Invite link</div>
            <div id="share-url" class="truncate font-mono text-sm">…</div>
          </div>
          <button id="copy-link"
                  class="inline-flex min-h-[44px] shrink-0 items-center justify-center rounded bg-emerald-600 px-4 py-2 text-sm font-medium hover:bg-emerald-500">
            Copy link
          </button>
        </div>

        <!--
          Identity / room strip.

          Mobile (default): 2 columns. ROOM and YOU share the top
          row; ROLE takes a dedicated full-width row below
          (col-span-2). This stops long player names from
          truncating ROLE off-screen on phones AND gives ROLE
          its own line so it's the easiest thing to glance at
          during play.

          Desktop (sm:): 3 equal columns, all on one row. ROLE
          drops back to a single column (sm:col-span-1) so the
          mobile span doesn't carry over.

          min-w-0 on each cell allows truncation inside the
          grid track (without it, the long YOU text would push
          ROOM off-screen instead of ellipsing).
        -->
        <div class="grid grid-cols-2 gap-3 rounded border border-slate-700 bg-slate-800/40 p-3 sm:grid-cols-3 sm:p-4">
          <div class="min-w-0">
            <div class="text-xs uppercase tracking-wide text-slate-400">Room</div>
            <div id="room-code" class="truncate font-mono text-xl sm:text-2xl">----</div>
          </div>
          <div class="min-w-0">
            <div class="text-xs uppercase tracking-wide text-slate-400">You</div>
            <div id="me" class="truncate font-mono text-sm sm:text-base">—</div>
          </div>
          <div class="col-span-2 min-w-0 sm:col-span-1">
            <div class="text-xs uppercase tracking-wide text-slate-400">Role</div>
            <div id="my-role" class="truncate font-mono text-sm sm:text-base">—</div>
          </div>
        </div>

        <!--
          Host audio bar. Visible only on the host's device. Two
          reasons it exists outside the lobby's action panel:

          1. After a page refresh, the stored credentials rejoin the
             room silently — no user gesture. iOS / desktop browsers gate
             speechSynthesis behind a gesture, so a refresh during a
             live game would otherwise leave the host's phone mute
             with no obvious recovery. This bar gives them a tap
             target on every page they could land on after a
             refresh.
          2. It's also a status indicator: "Audio: on" reassures the
             host that the gesture took.

          Toggled by renderHostAudioBar(). Hidden for non-hosts and
          when TTS isn't supported on the device.
        -->
        <div id="host-audio-bar" class="hidden"></div>

        <!--
          Phase banner. Color + headline + helper text are all driven
          from the client-side reducer in renderActionPanel(). The
          #action-extras slot is where phase-specific affordances
          (e.g. "Submitted: Alice", "Waiting for the host…") render.
        -->
        <!--
          Narrator card. Echoes the most recent spoken cue as large
          on-screen text so (a) deaf / hard-of-hearing players have an
          equal experience, (b) hosts can confirm the cue fired, and
          (c) devices without speechSynthesis still get the prompts and
          can read them aloud manually.
        -->
        <div id="narrator-card"
             class="hidden rounded border border-amber-500/60 bg-amber-950/60 px-4 py-3 text-center text-lg font-semibold tracking-wide text-amber-100"
             aria-live="polite"></div>


        <section id="action-panel"
                 class="rounded border p-4 transition-colors duration-300">
          <div class="flex items-baseline justify-between gap-3">
            <div>
              <div id="phase-label" class="text-xs uppercase tracking-widest opacity-70">phase</div>
              <h2 id="phase-headline" class="text-xl font-semibold">Lobby</h2>
            </div>
            <div id="phase-day" class="font-mono text-sm opacity-70"></div>
          </div>
          <p id="phase-hint" class="mt-1 text-sm opacity-80">Waiting for the host to start the game.</p>

          <!--
            Night spectator banner. Shows whose turn it is and a
            countdown bar to the deadline. Visible only during Night,
            built dynamically by renderActionPanel.
          -->
          <div id="night-banner" class="hidden mt-3 rounded border border-indigo-500/40 bg-indigo-950/60 p-3">
            <div class="flex items-baseline justify-between gap-3">
              <div id="night-banner-text" class="text-sm font-medium text-indigo-100"></div>
              <!--
                Countdown text + bar are gated to the actor only (see
                viewerOwnsCurrentTimer in renderActionPanel /
                renderNightCountdownFrame). Shown only to the actor
                during the "act" sub-phase — narrate / ponder / sleep
                / settle have nothing actionable to time, and showing
                a draining bar to spectators would reveal the actor's
                deliberation pace.
              -->
              <div id="night-banner-countdown" class="hidden font-mono text-xs text-indigo-300"></div>
            </div>
            <div id="night-banner-bar-wrap" class="mt-2 hidden h-1.5 overflow-hidden rounded bg-indigo-950">
              <div id="night-banner-bar" class="h-full bg-indigo-400 transition-all" style="width: 100%"></div>
            </div>
          </div>

          <div id="action-extras" class="mt-3 flex flex-wrap items-center gap-2"></div>
        </section>

        <div>
          <!--
            Players panel header. Three slots:
              - "Players" label (left)
              - "Host: <name>" indicator (middle, populated by
                renderPlayers from hostId; hidden until the
                HostChanged event lands)
              - alive/total counter (right)
            We co-locate "who is the host" here so it lives in
            ONE canonical spot instead of being repeated as a
            badge on the host's player row, which competed with
            the per-row action buttons for horizontal space.
          -->
          <div class="mb-2 flex flex-wrap items-baseline justify-between gap-2">
            <div class="flex flex-wrap items-baseline gap-x-3 gap-y-1">
              <h2 class="text-xs uppercase tracking-wide text-slate-400">Players</h2>
              <span id="player-host" class="hidden text-xs text-slate-400"></span>
            </div>
            <span id="player-count" class="text-xs text-slate-500">0</span>
          </div>
          <!--
            Single column on mobile (taller, easier to scan and tap),
            two columns on tablet+. Bumped padding to p-2 sm:p-3 so
            the row chrome doesn't waste 12px of horizontal real
            estate on phones.
          -->
          <ul id="players"
              class="grid grid-cols-1 gap-2 rounded border border-slate-700 bg-slate-950/40 p-2 sm:grid-cols-2 sm:p-3">
            <li class="text-sm text-slate-500">Waiting for players to join…</li>
          </ul>
        </div>

        <!--
          Error surface. Hidden until something goes wrong (the server
          rejects a command, the WebSocket can't parse a frame, etc).
          Replaces the old "Event log" debug panel, which echoed every
          server frame as JSON — too noisy for end users, and the same
          information is in DevTools for anyone who needs it.
        -->
        <div id="errors"
             class="hidden rounded border border-rose-500/60 bg-rose-950/50 p-3 text-sm text-rose-200"></div>
      </section>

      <!--
        Shared notice modal — reused by the detective result, the
        "Blocked" notice, and the promotion announcement. Placed as a
        SIBLING of #game (not nested inside) because:

        On a live result, the engine emits detectiveResult in the
        same WS batch as phaseChanged → day_discussion. The day
        phase repaint and narrator card animation happen on the
        same tick. If the modal were nested deeper in the action
        panel chain, a parent re-render could blow it away. Sitting
        as a top-level fixed overlay sibling of #game keeps it
        isolated from the rest of the layout machinery.

        Shown only on the detective's own device when a
        detectiveResult event arrives (server-side PrivateTo
        visibility filter guarantees no one else receives the
        event). Color is tied to the result: rose = mafia hit,
        emerald = town. Both variants' classes are listed in the
        static class attribute below so Tailwind CDN's JIT picks
        them up (it scans HTML, not reliably JS strings) — guarded
        by "hidden" so they have no visual effect until the modal
        fires.
      -->
      <div id="notice-modal"
           class="hidden fixed inset-0 z-50 flex items-center justify-center bg-slate-950/90 p-6 backdrop-blur-sm"
           role="dialog"
           aria-modal="true"
           aria-live="polite">
        <div id="notice-modal-card"
             class="max-w-lg rounded-xl border-2 px-8 py-8 text-center shadow-2xl
                    border-rose-500/70 bg-rose-950/95 text-rose-100
                    border-emerald-500/70 bg-emerald-950/95 text-emerald-100">
          <div id="notice-modal-eyebrow" class="text-sm uppercase tracking-widest opacity-70">Investigation result</div>
          <div id="notice-modal-body" class="mt-4 text-3xl font-bold tracking-wide leading-snug"></div>
          <button id="notice-modal-dismiss"
                  class="mt-8 rounded-lg bg-slate-800 px-6 py-3 text-base font-semibold text-white hover:bg-slate-700">
            Got it
          </button>
        </div>
      </div>
    </main>

    <script>
      // ----- helpers ------------------------------------------------------

      const $ = (id) => document.getElementById(id);

      // Rejoin credentials are keyed per room: mafia.room.<code>.
      const storageKey = (code) => `mafia.room.${code}`;

      // Where those credentials live depends on the environment, because
      // two goals conflict:
      //   • Local testing spins up several players in separate tabs of ONE
      //     browser. That needs per-tab identity, which only sessionStorage
      //     provides (each tab gets its own copy) — otherwise the tabs would
      //     share a single seat and stomp on each other.
      //   • A real deployment needs credentials to survive a tab CLOSE, so a
      //     player who closes their tab can reopen the room link in a fresh
      //     tab and land back in their seat. Only localStorage persists
      //     across a tab close. In real life one device = one identity per
      //     room, so localStorage's cross-tab sharing is harmless.
      // So: sessionStorage on localhost (preserves the multi-tab test loop),
      // localStorage everywhere else (enables real-world tab-close rejoin).
      const isLocalhost =
        ["localhost", "127.0.0.1", "::1", "0.0.0.0"].includes(location.hostname);
      const credStore = isLocalhost ? sessionStorage : localStorage;

      const status = $("status");
      const errorPanel = $("errors");

      let ws = null;
      let myId = null;
      let myIsHost = false;
      let myRole = null;

      // mafiaPeers holds the PlayerIDs of every mafioso (including
      // myself), populated from the faction-scoped mafiaRoster event the
      // server sends only to mafia at game start. For a town viewer this
      // stays empty — they never receive the event — so the "Mafia"
      // roster badge can only ever appear on a mafia player's screen.
      // Lets the mafia see their teammates in the UI at all times.
      let mafiaPeers = new Set();

      // hostId is the PlayerID of the room's host, as announced by
      // the server's HostChanged event. The server is the single
      // source of truth — myIsHost is derived (hostId === myId) but
      // we keep both around because some UI paths render the badge
      // on any row (needs hostId), while others gate host-only
      // controls on whether *I* am the host (needs myIsHost).
      // null until the first HostChanged arrives, which is part of
      // every join's prior-event replay.
      let hostId = null;

      // Client-side roster reducer. Keyed by PlayerID. The server is
      // the source of truth; we just fold the public event stream into
      // a small local model so the UI can render a who's-here list
      // without re-querying anything. Rebuilt from scratch on every
      // (re)join so a replay never duplicates entries.
      //
      // Shape: { [pid]: { id, name, alive, deathCause, revealedRole } }
      let players = new Map();

      // Per-phase state. All of these are reset on phaseChanged so a
      // replay reconstructs them correctly from the event stream.
      //   phase        — current Phase string ("lobby", "night", …).
      //   day          — Day number from the engine (0 on first night).
      //   myAction     — Target this player submitted THIS night.
      //                  Populated from the actor's own
      //                  nightActionRecorded event.
      //   votes        — Map<voter, target> for the current day_vote.
      //   winner       — Faction string set by gameEnded.
      let phase = "lobby";
      let day = 0;
      let myAction = null;
      let votes = new Map();
      // votesRevealed mirrors the engine's same-named flag. While false
      // (voting open) the tally is HIDDEN: each client's `votes` map
      // holds only its own vote (the server keeps every other voter's
      // choice private), so we render no counts and no who-voted-for-whom.
      // The host's RevealVotes flips this true and ships the full tally
      // in one votesRevealed event; from then on everyone (incl. dead
      // players) sees the board and the per-row Vote buttons disappear
      // (voting is locked until a Clear & re-vote). Reset to false on
      // any phase change and on voteCleared.
      let votesRevealed = false;
      let winner = null;
      // dayLynchResolved mirrors the engine's same-named flag. Set to
      // true when a PlayerLynched event arrives during day_vote (the
      // PhaseChanged → day_discussion that follows is the post-lynch
      // discussion). Cleared on any PhaseChanged into "night". The
      // host UI keys off this to decide whether to show
      // "Open voting" (false) or "Begin night" (true) while sitting
      // in day_discussion.
      let dayLynchResolved = false;
      // rolesDealt mirrors the engine: true once StartGame has fired
      // and every player has been assigned a role. The host's lobby
      // UI swaps "Start game" → "Begin night" once this becomes true.
      let rolesDealt = false;

      // Lobby configuration mirrored from the server's GameCreated /
      // MafiaCountChanged events.
      //
      // These deliberately start as null rather than hardcoded
      // defaults (5/20/1). The server is the single source of truth
      // for the lobby bounds and the planned mafia count; baking
      // numbers in here too means two places to update if the engine
      // defaults ever change, and a brief window on first paint where
      // the UI shows numbers that don't match the server's. Instead
      // we render placeholders ("…") until the gameCreated event
      // lands — which happens at the top of every join/rejoin
      // handshake — and gate the host's Start button on having
      // received them.
      let lobbyMinPlayers = null;
      let lobbyMaxPlayers = null;
      let mafiaCount = null;

      // consortEnabled mirrors the engine's optional-Consort toggle for
      // the upcoming game. Event-sourced from consortChanged (replayed on
      // join), defaulting to false until the first event lands.
      let consortEnabled = false;

      // --- Night turn state (mirrors the engine's per-role sub-phase) ---
      //
      // During PhaseNight each role flows through a five-step sub-phase
      // sequence (narrate → act → ponder → sleep → settle), preceded
      // once per night by a global "opening" sub-phase. The engine is
      // the single source of truth for sub-phase transitions; the
      // client never advances on its own. Every transition arrives as
      // a typed event (nightOpeningStarted, nightNarrationStarted,
      // nightActionStarted, nightPonderStarted, nightSleepStarted,
      // nightSettleStarted) with a deadline stamped by the room.
      //
      // currentNightRole is the role for whom the current sub-phase
      // fires. "" outside a role's sub-phases (i.e. during opening
      // and between roles). nightTurnDeadlineMs is unix-millis at which
      // the CURRENT sub-phase auto-advances on the server. We rebind
      // it on every Night*Started event so the countdown bar tracks
      // the live sub-phase.
      let currentNightRole = "";
      let nightTurnDeadlineMs = 0;

      // iAmBlocked is set true when the server tells us (privately) that
      // the Consort blocked our action this night — delivered at the
      // start of our own act window. It suppresses the target picker for
      // the turn and is cleared at the start of each night.
      let iAmBlocked = false;
      // currentNightSubPhase mirrors the engine's NightSubPhase value.
      // Drives the audio cue selection (narrate/sleep speak; act/ponder/
      // settle/opening are silent or already-spoken) and the visibility
      // of Target buttons (only during "act" with a living actor).
      // Possible values: "" | "opening" | "narrate" | "act" | "ponder"
      //                | "sleep" | "settle".
      let currentNightSubPhase = "";
      // currentNightTurnPhantom mirrors the engine's per-turn Phantom
      // flag (carried by nightNarrationStarted / nightPonderStarted).
      // True when no living player holds currentNightRole; the
      // moderator audio still plays (so the room can't deduce which
      // role is dead from the absence of cues) but no NightAction is
      // accepted on the server, and no Target buttons render on any
      // client.
      let currentNightTurnPhantom = false;

      // narratorEnabled gates whether THIS device speaks. Only the host
      // narrates — having every player's phone narrate would yield
      // overlapping audio. Toggled by the "Test audio" / "Enable audio"
      // button (which also serves as the user-gesture needed by iOS to
      // unlock speechSynthesis).
      //
      // The user's preference persists in sessionStorage so a refresh
      // mid-game remembers it. BUT a refresh resets the browser's
      // autoplay-gate too — sessionStorage can't satisfy the
      // user-gesture requirement. So after a refresh we land here
      // with narratorEnabled=false even if the host had it on; the
      // host audio bar (#host-audio-bar) makes re-enabling a single
      // tap from any phase.
      const audioPrefKey = "mafia.audio.host";
      let narratorEnabled = false;
      // narratorPreference is the user's INTENT (persisted), distinct
      // from narratorEnabled which is the LIVE state after a gesture
      // this load. After a refresh, preference="on" and enabled=false
      // until the host taps the audio bar.
      let narratorPreference =
        typeof sessionStorage !== "undefined" &&
        sessionStorage.getItem(audioPrefKey) === "on";

      // narrationsSeen is a guard against double-narrating the same
      // event when handleEvent runs over the replay batch on join AND
      // again as live events arrive. We key on a stable string per
      // narration trigger; events not in this set fire normally.
      const narrationsSeen = new Set();

      // dayDiscussionPendingDeath holds the playerId killed last night
      // (if any), captured from PlayerKilled in the same event batch
      // as the phaseChanged → day_discussion. The narrator reads it on
      // the dawn cue, then clears it. Null = "nobody died."
      let dayDiscussionPendingDeath = null;

      // lastNightVictim is the same fact as dayDiscussionPendingDeath,
      // but tracked DURABLY: it stays set across renders and survives
      // page refreshes (rebuilt by the event replay), and is only
      // cleared when the next night begins. The day-discussion banner
      // uses it to surface "Last night: X was killed" as a UI chip,
      // not just a one-shot audio cue. Null = no death last night
      // (or we haven't seen a night yet).
      //
      // We keep dayDiscussionPendingDeath separate because the
      // narrator wants single-shot semantics (don't re-narrate a
      // death after a refresh into day_discussion); the banner
      // wants persistent semantics (DO re-display after refresh).
      // Trying to share one variable would mean one of those rules
      // has to give.
      let lastNightVictim = null;

      // --- TTS (narrator) ----------------------------------------------
      //
      // We use the browser's built-in speechSynthesis API. No external
      // dependency, no API key, works offline. Quality varies by device
      // but iOS Safari / macOS Safari / modern Chrome all produce
      // intelligible English voices.
      //
      // Quirks worth knowing:
      //   - iOS Safari blocks speechSynthesis until a user gesture has
      //     "unlocked" the audio context. The "Test audio" button in
      //     the lobby satisfies this.
      //   - Calling speak() while another utterance is in progress
      //     queues by default. We rely on that for back-to-back cues
      //     ("Mafia wake up. [pause] Choose your target.").
      //   - feature detection: not all browsers support it. If
      //     ttsSupported is false, the UI falls back to large on-screen
      //     text cards (renderNarratorCard).
      const ttsSupported =
        typeof window !== "undefined" &&
        "speechSynthesis" in window &&
        typeof window.SpeechSynthesisUtterance === "function";

      function speak(text, { rate = 0.95, pitch = 1, pauseBefore = 0 } = {}) {
        if (!ttsSupported || !narratorEnabled) return;
        const fire = () => {
          const utter = new SpeechSynthesisUtterance(text);
          utter.rate = rate;
          utter.pitch = pitch;
          window.speechSynthesis.speak(utter);
        };
        if (pauseBefore > 0) {
          setTimeout(fire, pauseBefore);
        } else {
          fire();
        }
      }

      // narrate runs ONLY on the host (gated by narratorEnabled, which
      // only the host ever sets to true). It also shows the spoken
      // text in a visual card so the room can see what the audio said
      // — useful both as an accessibility affordance and as a
      // fallback when TTS is unavailable.
      //
      // key dedupes replays: each narration sets a stable key so we
      // don't repeat the cue when an event arrives twice (once during
      // join replay, once during the live broadcast that immediately
      // follows). Live events that should ALWAYS speak (e.g. a fresh
      // nightOpeningStarted / nightNarrationStarted / nightSleepStarted)
      // pass key=null.
      function narrate(text, { key = null, pauseBefore = 0 } = {}) {
        if (key !== null) {
          if (narrationsSeen.has(key)) return;
          narrationsSeen.add(key);
        }
        showNarratorCard(text);
        if (narratorEnabled) speak(text, { pauseBefore });
      }

      // Shows the spoken text in a top-of-page card for a few seconds.
      // Stacked: multiple lines in a row appear together. The card is
      // visible even on non-host devices, which serves as a fallback
      // when the host's TTS is unavailable — a non-host can read it
      // aloud to the room.
      let narratorCardTimer = null;
      function showNarratorCard(text) {
        const el = $("narrator-card");
        if (!el) return;
        el.textContent = text;
        el.classList.remove("hidden");
        if (narratorCardTimer) clearTimeout(narratorCardTimer);
        narratorCardTimer = setTimeout(() => {
          el.classList.add("hidden");
          el.textContent = "";
        }, 6000);
      }

      // --- Detective toast ---------------------------------------------
      //
      // Shows the detective the result of their last investigation as a
      // prominent modal. Color signals the outcome at a glance: rose
      // (danger) for a mafia hit, emerald for confirmed town.
      //
      // No auto-dismiss: the engine emits detectiveResult in the same
      // batch as phaseChanged → day_discussion, so the underlying UI
      // repaint and "Everybody, wake up" narration fire immediately
      // afterward. A timed dismiss feels like the result vanished
      // mid-read. Instead we REQUIRE the detective to tap "Got it"
      // (or click the dimmed overlay). That gating click is also the
      // detective's own pacing signal — they read, internalize, then
      // dismiss and the day starts for them visually.
      //
      // The dim overlay (bg-slate-950/85) on top of z-50 also masks
      // the day-discussion repaint behind the modal, so the
      // detective isn't visually distracted by phase transitions
      // while reading. The modal is local-only — it never echoes
      // via narrator TTS, since the detective's result is private
      // and we don't want the host's phone speaking it aloud.
      // Modal color palettes, shared by the detective result and the
      // consort-related notices (block / promotion). showModalCard always
      // strips ALL palettes before applying one, so back-to-back notices
      // of different colors never stack classes.
      const MODAL_ROSE    = ["border-rose-500/70",    "bg-rose-950/95",    "text-rose-100"];
      const MODAL_EMERALD = ["border-emerald-500/70", "bg-emerald-950/95", "text-emerald-100"];
      const MODAL_AMBER   = ["border-amber-500/70",   "bg-amber-950/95",   "text-amber-100"];

      // modalAutoDismisses marks the currently-shown modal as one that
      // should clear itself when the actor's night turn advances past its
      // ponder (the "Blocked" notice), rather than waiting for a manual
      // "Got it" tap. The detective result and the promotion announcement
      // leave this false: they must NOT vanish on a timer.
      let modalAutoDismisses = false;

      function showModalCard(text, palette, eyebrow = "Investigation result", autoDismiss = false) {
        const modal = $("notice-modal");
        const card = $("notice-modal-card");
        const body = $("notice-modal-body");
        if (!modal || !card || !body) return;
        modalAutoDismisses = autoDismiss;
        // The eyebrow is the small uppercase heading above the body. It
        // defaults to the detective's label, so block/promotion notices
        // must pass their own — otherwise they'd misleadingly read
        // "Investigation result".
        const eyebrowEl = $("notice-modal-eyebrow");
        if (eyebrowEl) eyebrowEl.textContent = eyebrow;
        card.classList.remove(...MODAL_ROSE, ...MODAL_EMERALD, ...MODAL_AMBER);
        card.classList.add(...palette);
        body.textContent = text;
        modal.classList.remove("hidden");
        // Inline display:flex wins over EVERY Tailwind utility, no
        // matter what order .hidden / .flex appear in the generated
        // stylesheet. Intentional defensive overkill.
        modal.style.display = "flex";
      }

      function showDetectiveToast(targetName, isMafia) {
        showModalCard(
          isMafia
            ? `${targetName} IS a mafia member.`
            : `${targetName} is NOT a mafia member.`,
          isMafia ? MODAL_ROSE : MODAL_EMERALD
        );
      }

      // showBlockedToast tells a roleblocked player their action was
      // nullified. Reuses the shared notice modal (same "Got it" dismissal).
      function showBlockedToast() {
        showModalCard(
          "The Consort distracted you. You cannot act.",
          MODAL_AMBER,
          "Blocked",
          true // auto-clears when our ponder elapses (see nightSleepStarted)
        );
      }

      // showPromotedToast announces a consort's promotion to full mafia
      // (the cabal was wiped out and she's taken over the kill).
      function showPromotedToast() {
        showModalCard(
          "The mafia have been wiped out — you are now the Mafia. You'll choose the kill from the next night on.",
          MODAL_ROSE,
          "You've been promoted"
        );
      }

      function hideModalCard() {
        const modal = $("notice-modal");
        if (!modal) return;
        modal.classList.add("hidden");
        modal.style.display = "none";
        const body = $("notice-modal-body");
        if (body) body.textContent = "";
        modalAutoDismisses = false;
      }

      // --- Night countdown bar -----------------------------------------
      //
      // The night banner shows a per-turn countdown that ticks down to
      // the engine-stamped deadline. Updates ~10×/second so the bar
      // smoothly drains and the seconds number is responsive.
      //
      // Only the actor ticks the countdown, and only during the "act"
      // sub-phase — see viewerOwnsCurrentTimer for the rationale
      // (narrate/ponder/sleep/settle are passive for the actor, and
      // showing timing to non-actors leaks deliberation pace).
      let nightCountdownInterval = null;
      let nightCountdownTotalMs = 0; // initial duration for the bar's %

      function startNightCountdown(deadlineMs) {
        stopNightCountdown();
        if (!deadlineMs) return;
        if (!viewerOwnsCurrentTimer()) return;
        nightCountdownTotalMs = Math.max(1, deadlineMs - Date.now());
        renderNightCountdownFrame();
        nightCountdownInterval = setInterval(renderNightCountdownFrame, 100);
      }

      function stopNightCountdown() {
        if (nightCountdownInterval) {
          clearInterval(nightCountdownInterval);
          nightCountdownInterval = null;
        }
      }

      // The countdown is shown ONLY to the actor of the current
      // sub-phase, AND only while we're in the "act" sub-phase — the
      // window during which they actually need to make a decision.
      //
      // Two reasons to gate this tightly:
      //
      //   1. Information leak. Showing a draining bar to spectators
      //      would tell the room exactly how long the actor took to
      //      decide (60s of deliberation vs an instant click is
      //      meaningful signal that could be used against them in
      //      the next discussion). Dead former-actors are spectators
      //      here too — the alive check covers them.
      //
      //   2. Signal-to-noise. During the actor's OWN narrate /
      //      ponder / sleep / settle sub-phases, there's nothing to
      //      decide — they're just listening to audio or sitting in
      //      a brief pause. A countdown bar in those windows is
      //      visual noise that suggests urgency where there is none.
      //      The only window where the seconds-remaining is
      //      actionable information for the actor is "act".
      //
      // Opening is global ("City, go to sleep"), has no actor, and
      // similarly has nothing actionable — so no countdown either.
      function viewerOwnsCurrentTimer() {
        if (currentNightSubPhase !== "act") return false;
        if (!currentNightRole || currentNightRole !== myRole) return false;
        const me = players.get(myId);
        return !!(me && me.alive);
      }

      function renderNightCountdownFrame() {
        const text = $("night-banner-countdown");
        const bar = $("night-banner-bar");
        if (!viewerOwnsCurrentTimer()) {
          if (text) text.textContent = "";
          if (bar) bar.style.width = "0%";
          // Stop ticking entirely outside the act window — the next
          // sub-phase event will re-arm the interval if/when this
          // viewer becomes the actor again.
          stopNightCountdown();
          return;
        }
        const remaining = Math.max(0, nightTurnDeadlineMs - Date.now());
        const seconds = Math.ceil(remaining / 1000);
        const pct = Math.max(0, Math.min(100, (remaining / nightCountdownTotalMs) * 100));
        if (text) text.textContent = `${seconds}s`;
        if (bar) bar.style.width = `${pct}%`;
        if (remaining <= 0) stopNightCountdown();
      }

      // Audio enablement (host-only). speechSynthesis on iOS requires
      // a user-gesture before it will speak; this button is what
      // satisfies that requirement. It also lets the host test the
      // voice quality before starting the game.
      function enableNarrator() {
        if (!ttsSupported) {
          showNarratorCard("Text-to-speech is not available on this device. The on-screen card will still show every cue.");
          return;
        }
        narratorEnabled = true;
        narratorPreference = true;
        try { sessionStorage.setItem(audioPrefKey, "on"); } catch {}
        speak("Audio enabled. Ready when you are.", { rate: 1 });
        showNarratorCard("Audio enabled. The host's phone will narrate the game.");
        renderHostAudioBar();
        renderActionPanel(); // rerender so the button switches state
      }

      function disableNarrator() {
        narratorEnabled = false;
        narratorPreference = false;
        try { sessionStorage.removeItem(audioPrefKey); } catch {}
        // Cancel any in-flight utterances so a tap-to-mute is snappy.
        if (ttsSupported) {
          try { window.speechSynthesis.cancel(); } catch {}
        }
        renderHostAudioBar();
        renderActionPanel();
      }

      // renderHostAudioBar paints the persistent audio toggle / status
      // pill that lives above the action panel. Visible only for the
      // host (non-hosts never narrate) AND only after they've joined a
      // room. Three visual states:
      //
      //   - TTS unsupported  -> info chip, no buttons.
      //   - audio not yet
      //     unlocked         -> prominent amber "Enable audio" CTA.
      //                        This is the recovery path after a refresh.
      //   - audio unlocked   -> green "Audio: on" pill with a small
      //                        "Mute" affordance.
      //
      // Non-hosts and the pre-room (lobby) state hide the bar entirely.
      function renderHostAudioBar() {
        const bar = $("host-audio-bar");
        if (!bar) return;
        if (!myIsHost || !myId) {
          bar.classList.add("hidden");
          bar.innerHTML = "";
          return;
        }
        bar.innerHTML = "";
        bar.className =
          "flex items-center justify-between gap-3 rounded border p-3";

        if (!ttsSupported) {
          bar.classList.add("border-slate-700", "bg-slate-800/40", "text-slate-300");
          const note = document.createElement("div");
          note.className = "text-sm";
          note.textContent =
            "Audio narration isn't available on this device. The on-screen card will still show every cue.";
          bar.appendChild(note);
          return;
        }

        if (!narratorEnabled) {
          // Either first load (preference=off) or post-refresh
          // (preference=on but gesture not yet given). Either way
          // the CTA is the same: tap to enable.
          bar.classList.add("border-amber-500/60", "bg-amber-950/40", "text-amber-100");
          const note = document.createElement("div");
          note.className = "min-w-0 text-sm";
          note.textContent = narratorPreference
            ? "Audio paused after refresh. Tap to re-enable."
            : "Narrator audio is off. Enable it on the host's phone.";
          const btn = document.createElement("button");
          btn.className =
            "inline-flex min-h-[44px] shrink-0 items-center justify-center rounded bg-amber-600 px-4 py-2 text-sm font-medium text-white hover:bg-amber-500";
          btn.textContent = narratorPreference ? "Re-enable audio" : "Enable audio";
          btn.addEventListener("click", () => enableNarrator());
          bar.appendChild(note);
          bar.appendChild(btn);
          return;
        }

        bar.classList.add("border-emerald-700/60", "bg-emerald-950/40", "text-emerald-100");
        const note = document.createElement("div");
        note.className = "min-w-0 text-sm";
        note.textContent = "Audio: on. Narration will play on this device.";
        const btn = document.createElement("button");
        btn.className =
          "inline-flex min-h-[44px] shrink-0 items-center justify-center rounded bg-emerald-700 px-4 py-2 text-sm font-medium text-white hover:bg-emerald-600";
        btn.textContent = "Mute";
        btn.addEventListener("click", () => disableNarrator());
        bar.appendChild(note);
        bar.appendChild(btn);
      }

      // When we kick off a rejoin attempt from stored credentials
      // (e.g. on page reload) we remember the room code here. If the
      // server then sends an "error" before we ever receive "rejoined"
      // / "joined", we know the stored credentials are stale and we
      // can recover by clearing them and showing the join lobby. Once
      // a successful (re)join arrives this is cleared.
      let pendingRejoinCode = null;

      // pendingJoinCode is the symmetric flag for first-time joins
      // (no stored credentials). Set immediately before we send the
      // "join" frame and cleared on "joined" ack or on any "error"
      // frame. Lets us distinguish "the lobby is closed" / "lobby
      // full" errors during a join handshake from in-game command
      // errors that arrive over the same channel, so we can show
      // a friendly message instead of the raw engine sentinel.
      let pendingJoinCode = null;

      // --- Auto-reconnect state -----------------------------------------
      //
      // Once we've successfully joined a room, a dropped socket should
      // heal itself rather than stranding the player on a dead screen.
      // Drops are common in this game's usage: phones lock/pocket during
      // the 15–20 min verbal day discussion (mobile browsers suspend the
      // tab and tear down the WebSocket), and idle proxies/NATs cull
      // quiet connections. The server replays our full state on rejoin,
      // so a reconnect is invisible once it lands.
      //
      // currentRoomCode is the room we're connected to (or reconnecting
      // to); creds for it live in credStore under storageKey(code).
      let currentRoomCode = null;
      // reconnecting is true while the established-drop retry loop is
      // active. It distinguishes "lost an in-game connection, keep
      // retrying" from the page-load auto-rejoin (pendingRejoinCode),
      // which bounces to the lobby on first failure.
      let reconnecting = false;
      // reconnectAttempts feeds the exponential backoff; reset to 0 on
      // any successful (re)join and on a foreground/network resume.
      let reconnectAttempts = 0;
      // reconnectTimer holds the pending setTimeout handle so we never
      // stack multiple retries.
      let reconnectTimer = null;

      const RECONNECT_BASE_MS = 500;
      const RECONNECT_CAP_MS = 10000;

      // reconnectDelayMs returns the next backoff delay and advances the
      // attempt counter. Exponential (0.5s, 1s, 2s, … capped at 10s)
      // with ±20% jitter so a roomful of clients that dropped together
      // (e.g. a transient server blip) don't reconnect in lockstep.
      function reconnectDelayMs() {
        const raw = Math.min(RECONNECT_CAP_MS, RECONNECT_BASE_MS * 2 ** reconnectAttempts);
        reconnectAttempts++;
        return Math.round(raw * (0.8 + Math.random() * 0.4));
      }

      // cancelReconnect clears any scheduled retry and stops the loop.
      function cancelReconnect() {
        if (reconnectTimer) {
          clearTimeout(reconnectTimer);
          reconnectTimer = null;
        }
        reconnecting = false;
      }

      // scheduleReconnect arms a single backoff retry. Guarded so a
      // burst of close/error events can't stack timers. We retry
      // indefinitely: an in-person game can sit idle for a long time
      // and we'd rather keep trying than give up and force a manual
      // reload. The auth_failed path (stale creds) is what breaks the
      // loop and bounces to the lobby.
      function scheduleReconnect() {
        if (reconnectTimer) return;
        reconnecting = true;
        const delay = reconnectDelayMs();
        showReconnectingBanner(true);
        setStatus(`reconnecting to ${currentRoomCode}…`, "text-amber-400");
        reconnectTimer = setTimeout(() => {
          reconnectTimer = null;
          reconnectNow();
        }, delay);
      }

      // reconnectNow opens a fresh rejoin socket using the stored creds
      // for the current room. If creds are missing/corrupt (shouldn't
      // happen post-join), we bounce to the lobby instead of looping.
      function reconnectNow() {
        const code = currentRoomCode;
        if (!code) return;
        const stored = credStore.getItem(storageKey(code));
        if (!stored) {
          recoverToLobby(code, "Disconnected — rejoin to continue.");
          return;
        }
        let creds;
        try { creds = JSON.parse(stored); }
        catch { recoverToLobby(code, "Disconnected — rejoin to continue."); return; }
        reconnecting = true;
        setStatus(`reconnecting to ${code}…`, "text-amber-400");
        connect(code, null, creds);
      }

      // resumeConnectionIfNeeded fires when the tab returns to the
      // foreground (visibility/pageshow) or the network comes back
      // (online). A suspended mobile tab can't run our backoff timer,
      // so this is the path that actually reconnects a phone taken out
      // of a pocket. We reset the backoff so the resume is snappy.
      function resumeConnectionIfNeeded() {
        if (!myId || !currentRoomCode) return;
        if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) return;
        cancelReconnect();
        reconnectAttempts = 0;
        reconnectNow();
      }

      // showReconnectingBanner toggles a fixed top-of-screen strip so a
      // reconnecting player gets visible feedback even while the in-game
      // view (not the lobby status line) is on screen. Created lazily so
      // it costs nothing until the first drop.
      let reconnectBanner = null;
      function showReconnectingBanner(show) {
        if (show) {
          if (!reconnectBanner) {
            reconnectBanner = document.createElement("div");
            reconnectBanner.className =
              "fixed inset-x-0 top-0 z-50 bg-amber-500 text-slate-900 text-center text-sm font-semibold py-1.5 shadow-lg";
            reconnectBanner.textContent = "Reconnecting…";
            document.body.appendChild(reconnectBanner);
          }
          reconnectBanner.classList.remove("hidden");
        } else if (reconnectBanner) {
          reconnectBanner.classList.add("hidden");
        }
      }

      function setStatus(text, klass = "text-slate-400") {
        status.textContent = text;
        status.className = `text-sm ${klass}`;
      }

      // Builds the canonical share link for a room. Always pointed at
      // the current origin so it Just Works in dev (localhost:8080) and
      // anywhere we deploy later.
      function shareLinkFor(code) {
        return `${location.origin}/?room=${encodeURIComponent(code)}`;
      }

      // Reads ?room=XYZW from the URL and normalises to upper-case.
      // Returns null if there is no room param or it's empty.
      function roomFromURL() {
        const raw = new URLSearchParams(location.search).get("room");
        if (!raw) return null;
        return raw.trim().toUpperCase();
      }

      // Reads ?name=Alice from the URL (trimmed). Returns null when the
      // param is absent or blank. Only consulted by the auto-join demo
      // flow (maybeAutoJoinFromURL); normal share links never carry it.
      function nameFromURL() {
        const raw = new URLSearchParams(location.search).get("name");
        if (!raw) return null;
        const trimmed = raw.trim();
        return trimmed.length > 0 ? trimmed : null;
      }

      function showGame(code) {
        $("lobby").classList.add("hidden");
        $("game").classList.remove("hidden");
        $("room-code").textContent = code;
        $("share-url").textContent = shareLinkFor(code);
      }

      // Renders the YOU box: "Name (host)". Name is server-truth.
      // The wire-level PlayerID (p1, p2, ...) is intentionally
      // omitted: it cluttered the strip without giving players any
      // useful information (they think of each other by name, and
      // the server now rejects duplicate names case-insensitively,
      // so visual ambiguity can't happen). pid stays on the
      // function signature in case a future debug overlay wants it.
      function formatMe(name, _pid, isHost) {
        const safeName = name && name.trim() ? name : "(unnamed)";
        return `${safeName}${isHost ? " (host)" : ""}`;
      }

      // ----- roster reducer + render --------------------------------------

      // resetGameState clears everything derived from the event stream
      // so a (re)join can rebuild the model from scratch via replay.
      function resetGameState() {
        players = new Map();
        phase = "lobby";
        day = 0;
        myAction = null;
        votes = new Map();
        votesRevealed = false;
        winner = null;
        myRole = null;
        mafiaPeers = new Set();
        dayLynchResolved = false;
        rolesDealt = false;
        // hostId is rebuilt from the HostChanged event in the
        // join/rejoin replay; null it so renderPlayers hides the
        // "Host: <name>" label until the replay re-populates it
        // (otherwise we'd briefly show stale identity from a
        // previous session).
        hostId = null;
        // Lobby config is event-sourced (gameCreated / mafiaCountChanged);
        // null out so the replay rebuilds it from the server's
        // events and we don't briefly render stale numbers from a
        // previous session.
        lobbyMinPlayers = null;
        lobbyMaxPlayers = null;
        mafiaCount = null;
        consortEnabled = false;
        // Night turn state — engine-authoritative; replayed on join.
        currentNightRole = "";
        nightTurnDeadlineMs = 0;
        currentNightSubPhase = "";
        currentNightTurnPhantom = false;
        iAmBlocked = false;
        dayDiscussionPendingDeath = null;
        lastNightVictim = null;
        narrationsSeen.clear();
        stopNightCountdown();
        // Clear any open notice modal so a refresh doesn't carry
        // a stale "X IS a mafia member" card into the new session.
        hideModalCard();
        $("my-role").textContent = "—";
        renderAll();
      }

      // renderAll re-renders every dynamic panel. Called whenever phase
      // changes (cheap: at most every few seconds) so that any UI piece
      // depending on phase + roster + votes stays consistent.
      function renderAll() {
        renderInviteBanner();
        renderHostAudioBar();
        renderPlayers();
        renderActionPanel();
      }

      // renderInviteBanner toggles the "Invite link" strip based on
      // whether the room is still accepting joins.
      //
      // Boundary: rolesDealt — set when the engine emits its first
      // RoleAssigned event (i.e. StartGame ran). That's the same
      // boundary applyAddPlayer uses to reject new joiners, so
      // hiding the banner here keeps the UI honest with the server.
      // We deliberately do NOT key on phase === "lobby" alone,
      // because the phase stays "lobby" between StartGame and
      // BeginNight — during that window the room is closed but the
      // phase string would still let the banner show.
      function renderInviteBanner() {
        const banner = $("invite-banner");
        if (!banner) return;
        banner.classList.toggle("hidden", rolesDealt);
      }

      function upsertPlayer(pid, patch) {
        const existing = players.get(pid) || {
          id: pid,
          name: pid,
          alive: true,
          deathCause: null,    // "killed" | "lynched" | null
          revealedRole: null,  // populated at gameEnded for everyone
        };
        players.set(pid, { ...existing, ...patch });
        // Roster changes can affect the action panel hint
        // (e.g. "Waiting for 2 more players" → "Ready to start").
        renderPlayers();
        renderActionPanel();
      }

      function renderPlayers() {
        const list = $("players");
        const count = $("player-count");
        const hostLabel = $("player-host");
        list.innerHTML = "";

        // "Host: <name>" lives in the panel header (one canonical
        // spot) instead of as a per-row badge. We hide the label
        // until HostChanged lands and the host is in our roster —
        // showing "Host: p1" before the PlayerJoined for p1 lands
        // would look like a bug. In practice these arrive in the
        // same WS batch, so the hidden state is sub-frame.
        if (hostLabel) {
          const hp = hostId ? players.get(hostId) : null;
          if (hp) {
            hostLabel.textContent = `Host: ${hp.name || hostId}`;
            hostLabel.classList.remove("hidden");
          } else {
            hostLabel.textContent = "";
            hostLabel.classList.add("hidden");
          }
        }

        if (players.size === 0) {
          const empty = document.createElement("li");
          empty.className = "text-sm text-slate-500";
          empty.textContent = "Waiting for players to join…";
          list.appendChild(empty);
          count.textContent = "0";
          return;
        }

        // Deterministic order: insertion order is the join order, which
        // is the most natural reading order. Map iteration preserves it.
        let alive = 0;
        for (const p of players.values()) {
          if (p.alive) alive++;
          list.appendChild(renderPlayerRow(p));
        }
        // In the lobby, frame the count as "joined / cap" so the host
        // knows when the room is full. After the game has started the
        // cap is irrelevant — switch to "alive / total".
        if (phase === "lobby") {
          // Use "?" for the cap/min until the server's gameCreated
          // event lands (lobbyMaxPlayers/MinPlayers are null then).
          // This is a sub-second window in practice — first
          // paint to first event — but rendering "null" would
          // look like a bug.
          const cap = lobbyMaxPlayers ?? "?";
          const min = lobbyMinPlayers ?? "?";
          count.textContent = `${players.size} / ${cap} joined (min ${min})`;
        } else {
          count.textContent = `${alive} alive / ${players.size} total`;
        }
      }

      function renderPlayerRow(p) {
        const li = document.createElement("li");
        li.className =
          "flex items-center justify-between gap-2 rounded border border-slate-800 bg-slate-900/60 px-3 py-2";

        const left = document.createElement("div");
        left.className = "min-w-0";

        const nameEl = document.createElement("div");
        nameEl.className = "min-w-0 truncate text-sm font-medium";
        if (!p.alive) nameEl.classList.add("text-slate-500", "line-through");
        nameEl.textContent = p.name;

        // Secondary line under the name. We used to lead with the
        // server-assigned PlayerID (p1, p2, ...) for moderator
        // disambiguation, but it cluttered every row even though
        // players think of each other by name; engine-level wire
        // identity doesn't belong in the player-facing UI. Now the
        // line only renders when there's something meaningful to
        // show (death cause, revealed role, current vote tally),
        // and is omitted entirely otherwise so living players in
        // ordinary phases get a clean single-line row.
        // The sub-line WRAPS rather than truncates: the post-reveal
        // "voted by A, B, C, …" list can name up to (roster-1) players,
        // which on a phone (single-column rows) would otherwise be
        // clipped to one line with an ellipsis, hiding most voters. The
        // other sub-line contents (death cause, revealed role) are short
        // and unaffected. The row is flex items-center, so a taller
        // wrapped left column stays aligned with the right-side badge.
        const subEl = document.createElement("div");
        subEl.className = "font-mono text-xs text-slate-500 break-words leading-snug";
        const bits = [];
        if (!p.alive) {
          bits.push(p.deathCause === "lynched" ? "lynched by vote" : "killed in the night");
        }
        if (p.revealedRole) bits.push(p.revealedRole);
        // Vote tally is secret until the host reveals it. Pre-reveal we
        // show NO counts (not even your own contribution) — a voter's
        // selection is conveyed by their row's "Voted ✓" highlight and
        // the "Your vote: X" chip instead. Post-reveal each living
        // player's row shows how many votes they received and the names
        // of everyone who voted against them, so the whole room (incl.
        // the dead) can read exactly who's lining up on whom.
        if (phase === "day_vote" && votesRevealed && p.alive) {
          const voters = votersFor(p.id);
          if (voters.length > 0) {
            bits.push(`${voters.length} vote${voters.length === 1 ? "" : "s"}`);
            bits.push(`voted by ${voters.join(", ")}`);
          }
        }

        // Identity badges (You / Mafia) sit inline right after the name
        // rather than in the right-hand cluster. Keeping them on the left
        // means the action buttons (Target / Vote / Save self) stay
        // flush-right and vertically aligned across every row, regardless
        // of how many badges a given row carries. shrink-0 keeps the
        // badges intact while a long name truncates on narrow screens.
        const nameLine = document.createElement("div");
        nameLine.className = "flex min-w-0 items-center gap-2";
        nameLine.appendChild(nameEl);
        if (p.id === myId) {
          nameLine.appendChild(badge("You", "shrink-0 bg-emerald-700 text-emerald-100"));
        }
        // mafiaPeers is populated only from the faction-scoped mafiaRoster
        // event, so it's always empty for town — the "Mafia" badge can
        // only ever appear on a mafioso's own screen. Shown in every phase
        // so the mafia can see their allies at a glance.
        if (mafiaPeers.has(p.id)) {
          nameLine.appendChild(badge("Mafia", "shrink-0 bg-rose-800 text-rose-100"));
        }

        left.appendChild(nameLine);
        if (bits.length > 0) {
          subEl.textContent = bits.join(" · ");
          left.appendChild(subEl);
        }

        const right = document.createElement("div");
        right.className = "flex shrink-0 items-center gap-1";

        // Phase-aware action button on each row. Targeting lives here
        // (vs a separate panel) so action and identity stay together.
        const btn = phaseActionButton(p);
        if (btn) right.appendChild(btn);
        // No per-row "Host" badge: who-is-host lives in the
        // Players panel header (see renderPlayers). The previous
        // badge competed with the row's action button (Vote /
        // Target) for horizontal space on narrow screens.

        li.appendChild(left);
        li.appendChild(right);
        return li;
      }

      // tallyFor returns the current public vote count against pid.
      function tallyFor(pid) {
        let n = 0;
        for (const target of votes.values()) if (target === pid) n++;
        return n;
      }

      // votersFor returns the display names of everyone who voted for
      // pid, in roster (join) order so the list is stable across renders.
      // Only meaningful once votes are revealed (pre-reveal the `votes`
      // map holds at most the local player's own vote).
      function votersFor(pid) {
        const names = [];
        for (const p of players.values()) {
          if (votes.get(p.id) === pid) names.push(p.name);
        }
        return names;
      }

      // projectedLynch mirrors the server's strict-majority rule
      // (resolveDayVote in internal/game/rules_day.go): it returns the
      // player who WOULD be lynched if the host finalized right now — the
      // single target whose vote count is more than half the living
      // population (count*2 > living) — or null when no target clears
      // that bar (a tie, a plurality short of half, abstentions, or no
      // votes). Only meaningful once votes are revealed, since the full
      // tally isn't local before then. KEEP IN SYNC with the server rule.
      function projectedLynch() {
        let living = 0;
        for (const p of players.values()) if (p.alive) living++;
        // At most one target can clear >50%, so the first match is THE
        // majority target — same uniqueness argument as the server.
        for (const p of players.values()) {
          if (tallyFor(p.id) * 2 > living) return p;
        }
        return null;
      }

      // canActAtNight reports whether the LOCAL player has a night
      // action available given their role. Villager has none. The
      // engine also forbids the doctor from self-saving on Night 0,
      // but the wire never echoes the day cleanly enough for us to
      // pre-block that client-side; we let the server reject and the
      // error flow into the log. Conservative behavior.
      function canActAtNight() {
        if (!myRole) return false;
        return (
          myRole === "mafia" ||
          myRole === "doctor" ||
          myRole === "detective" ||
          myRole === "consort"
        );
      }

      // phaseActionButton returns a per-row action button suitable for
      // the current phase, or null if no row-action applies.
      function phaseActionButton(p) {
        const me = players.get(myId);
        const iAmAlive = !!(me && me.alive);

        // Night Target buttons are gated by the strict turn-order
        // rule: only show them when it's THIS role's turn AND we're
        // in the "act" sub-phase. Outside the turn or in any other
        // sub-phase (narrate / ponder / sleep / settle / opening) the
        // engine would reject the action with ErrNotYourTurn or
        // ErrWrongPhase, so hiding the buttons makes the UX match
        // the rules. The act sub-phase is the engine's authoritative
        // "actor may submit" window; it begins only after the role's
        // narration has fully played out.
        //
        // Phantom turns (no living holder of the role) skip the act
        // sub-phase entirely on the server, so currentNightSubPhase
        // never reaches "act" for them — but we keep the explicit
        // phantom guard for defense-in-depth.
        // Row buttons (Target / Vote) are sized to clear the 44px
        // iOS HIG tap-target minimum. The previous px-2/py-1/text-xs
        // styling looked nice on desktop but produced ~24×16px hit
        // areas that were borderline unusable on a phone.
        const rowBtnBase =
          "inline-flex min-h-[44px] min-w-[64px] items-center justify-center rounded px-3 py-2 text-sm font-medium";

        // Self-targeting policy:
        //   - mafia: cannot target self OR a fellow mafia — the engine
        //     rejects a mafia kill on ANY mafia (rolespec.go Validate),
        //     so we hide the button on every teammate row (mafiaPeers
        //     includes self, covering the self case too).
        //   - detective: cannot investigate self (ErrSelfTarget).
        //   - doctor: CAN save self on any night.
        // So we allow the self row only for the doctor.
        const isSelfRow = p.id === myId;
        const isFellowMafia = myRole === "mafia" && mafiaPeers.has(p.id);
        const canTargetThisRow =
          (!isSelfRow && !isFellowMafia) || myRole === "doctor";

        if (
          phase === "night" &&
          iAmAlive &&
          canActAtNight() &&
          currentNightRole === myRole &&
          currentNightSubPhase === "act" &&
          !currentNightTurnPhantom &&
          !iAmBlocked &&
          p.alive &&
          canTargetThisRow
        ) {
          const submitted = myAction === p.id;
          const b = document.createElement("button");
          b.className = submitted
            ? `${rowBtnBase} bg-amber-600 text-white`
            : `${rowBtnBase} bg-slate-700 text-white hover:bg-slate-600`;
          // The Consort "blocks" rather than "targets"; the doctor
          // "saves" (and may pick their own row). Everyone else "targets".
          if (myRole === "consort") {
            b.textContent = submitted ? "Blocked" : "Block";
          } else {
            b.textContent = submitted
              ? (isSelfRow ? "Saving self" : "Targeted")
              : (isSelfRow ? "Save self" : "Target");
          }
          b.addEventListener("click", () => send("nightAction", { target: p.id }));
          return b;
        }

        if (phase === "day_vote" && !votesRevealed && iAmAlive && p.alive && p.id !== myId) {
          const mine = votes.get(myId);
          const isMyTarget = mine === p.id;
          const b = document.createElement("button");
          b.className = isMyTarget
            ? `${rowBtnBase} bg-rose-600 text-white`
            : `${rowBtnBase} bg-slate-700 text-white hover:bg-slate-600`;
          // Tap the active selection again to retract — same button
          // does both jobs. The engine treats target:"" as a retract
          // (rules_day.go applyDayVote) and emits VoteRetracted.
          // The action-panel hint ("Tap your current selection to
          // retract") teaches the gesture; the button label stays
          // clean.
          b.textContent = isMyTarget ? "Voted ✓" : "Vote";
          b.addEventListener("click", () =>
            send("vote", { target: isMyTarget ? "" : p.id })
          );
          return b;
        }

        return null;
      }

      function badge(text, klass) {
        const span = document.createElement("span");
        span.className = `rounded px-1.5 py-0.5 text-[10px] font-semibold uppercase tracking-wide ${klass}`;
        span.textContent = text;
        return span;
      }

      // ----- action panel (per-phase) -------------------------------------

      // Phase theming. Each phase gets a distinct color so a glance is
      // enough to know what's happening. Lobby is neutral; Night is
      // deep indigo (sleeping); Day Discussion is amber (sunlight);
      // Day Vote is rose (tense); Ended depends on the winner.
      const PHASE_THEMES = {
        lobby:           "border-slate-700 bg-slate-800/40 text-slate-100",
        night:           "border-indigo-800 bg-indigo-950/40 text-indigo-100",
        day_discussion:  "border-amber-700/60 bg-amber-900/20 text-amber-100",
        day_vote:        "border-rose-700/60 bg-rose-900/20 text-rose-100",
        ended:           "border-emerald-700/60 bg-emerald-900/20 text-emerald-100",
      };

      function renderActionPanel() {
        const panel = $("action-panel");
        const label = $("phase-label");
        const headline = $("phase-headline");
        const dayEl = $("phase-day");
        const hint = $("phase-hint");
        const extras = $("action-extras");
        const banner = $("night-banner");
        const bannerText = $("night-banner-text");

        panel.className =
          "rounded border p-4 transition-colors duration-300 " +
          (PHASE_THEMES[phase] || PHASE_THEMES.lobby);

        label.textContent = phase.replace("_", " ");
        dayEl.textContent = phase === "lobby" || phase === "ended" ? "" : `Day ${day}`;
        extras.innerHTML = "";

        const me = players.get(myId);
        const iAmAlive = !!(me && me.alive);
        const total = players.size;

        // Show the night banner only when we're in Night AND a turn is
        // active. Between turns or outside Night, hide it so the panel
        // doesn't display stale countdowns.
        //
        // The countdown number + draining bar are nested inside the
        // banner but are FURTHER gated by viewerOwnsCurrentTimer: only
        // the actor sees them, and only during the "act" sub-phase
        // when the seconds-remaining is actually actionable. During
        // narrate / ponder / sleep / settle the actor is just
        // listening or waiting — a draining bar would falsely
        // suggest urgency. Showing the timer to spectators in any
        // sub-phase would also leak deliberation timing.
        //
        // The banner HEADING (text) is broader: it reflects whose
        // role-turn is in flight across all of that role's
        // sub-phases, so "Your turn — Mafia" stays visible from
        // narrate through settle for the mafia, giving them context
        // even when they can't yet click.
        const countdownEl = $("night-banner-countdown");
        const barWrapEl = $("night-banner-bar-wrap");
        if (phase === "night" && currentNightRole) {
          banner.classList.remove("hidden");
          const display = capitalize(currentNightRole);
          const youArePlayingThisRole =
            currentNightRole === myRole && !!(me && me.alive);
          if (youArePlayingThisRole) {
            const pickPhrase =
              myRole === "consort"
                ? "Pick someone to block"
                : "Pick a target";
            if (currentNightSubPhase === "act" && iAmBlocked) {
              bannerText.textContent =
                `Your turn — ${display}. You were blocked tonight — your action won't land.`;
            } else {
              bannerText.textContent =
                currentNightSubPhase === "act"
                  ? `Your turn — ${display}. ${pickPhrase} on the Players panel below.`
                  : `Your turn — ${display}. Listen to the moderator…`;
            }
          } else {
            bannerText.textContent = `${display} is choosing. Eyes closed.`;
          }
          if (viewerOwnsCurrentTimer()) {
            countdownEl.classList.remove("hidden");
            barWrapEl.classList.remove("hidden");
          } else {
            countdownEl.classList.add("hidden");
            barWrapEl.classList.add("hidden");
          }
        } else {
          banner.classList.add("hidden");
          countdownEl.classList.add("hidden");
          barWrapEl.classList.add("hidden");
        }

        switch (phase) {
          case "lobby": {
            headline.textContent = "Lobby";
            // A valid game needs: total in [min, max] AND mafia in
            // [1, total - 3]. The "3" mirrors the engine's
            // `reservedTownRoles + 1` (Det + Doc + ≥1 villager) in
            // internal/game/rules.go — keep them in sync. The
            // server is authoritative for both predicates; this
            // client-side check only drives the Start button's
            // enabled/disabled state and the hint text.
            const configReady =
              lobbyMinPlayers !== null && lobbyMaxPlayers !== null && mafiaCount !== null;

            const minMafia = 1;
            const maxMafiaNow = Math.max(0, total - 3);
            const tooFew = configReady && total < lobbyMinPlayers;
            const tooMany = configReady && total > lobbyMaxPlayers;
            const mafiaOK = configReady && mafiaCount >= minMafia && mafiaCount <= maxMafiaNow;
            const canStart = configReady && !tooFew && !tooMany && mafiaOK;

            if (!configReady) {
              // Sub-second window between WS open and the first
              // gameCreated event. Don't pretend to know the bounds.
              hint.textContent = "Connecting…";
            } else if (tooFew) {
              const need = lobbyMinPlayers - total;
              hint.textContent =
                `Waiting for ${need} more player${need === 1 ? "" : "s"} ` +
                `(min ${lobbyMinPlayers}, currently ${total}).`;
            } else if (tooMany) {
              hint.textContent = `Too many players (${total} > ${lobbyMaxPlayers}).`;
            } else if (!mafiaOK) {
              hint.textContent =
                `Mafia count ${mafiaCount} is invalid for ${total} players ` +
                `— must be between 1 and ${maxMafiaNow}.`;
            } else {
              hint.textContent = "Ready to start.";
            }

            // Mafia-count picker: host-only, lobby-only, AND only
            // before roles are dealt. The engine rejects setMafia
            // once StartGame has run (see applySetMafiaCount), so
            // the picker would be a UI lie at that point — the
            // host clicks +/− and nothing happens because
            // composeRoster has already committed. Hide it the
            // moment that boundary is crossed.
            if (!rolesDealt) {
              const mafiaPicker = renderMafiaPicker();
              if (mafiaPicker) extras.appendChild(mafiaPicker);
              extras.appendChild(renderConsortToggle());
            }

            if (myIsHost) {
              // Audio enablement now lives in the persistent host
              // audio bar above the action panel (#host-audio-bar)
              // so it's reachable from every phase, including after
              // a mid-game refresh. We deliberately don't duplicate
              // it here.
              if (!rolesDealt) {
                if (canStart) {
                  extras.appendChild(actionButton("Start game", "bg-emerald-600 hover:bg-emerald-500",
                                                  () => send("startGame")));
                } else {
                  extras.appendChild(disabledNote("Start unlocks once the lobby + roles are valid."));
                }
              } else {
                // Roles dealt; show "Begin night" so everyone can
                // peek at their role before the first night begins.
                headline.textContent = "Roles dealt";
                hint.textContent = "Everyone, check your role privately. When ready, the host begins the night.";
                extras.appendChild(actionButton("Begin night", "bg-indigo-600 hover:bg-indigo-500",
                                                () => send("beginNight")));
              }
            } else {
              if (!rolesDealt) {
                extras.appendChild(disabledNote("Only the host can start the game."));
              } else {
                hint.textContent = "You've been dealt your role. Waiting for the host to begin the night.";
              }
            }
            break;
          }

          case "night": {
            headline.textContent = "Night falls";
            if (!iAmAlive) {
              hint.textContent = "You're out. Watch the night unfold.";
              break;
            }
            // Hint text is driven by the strict turn order: only act
            // when the current turn matches your role; otherwise sit
            // still (eyes closed, in the in-person flow).
            if (!currentNightRole) {
              hint.textContent = "Eyes closed. Waiting for the moderator audio…";
            } else if (currentNightRole === myRole) {
              if (myAction) {
                hint.textContent = "Submitted. The next role will be summoned shortly.";
                const t = players.get(myAction);
                const verb = myRole === "consort" ? "Blocked" : "Targeted";
                extras.appendChild(noteChip(`${verb}: ${t ? t.name : myAction}`, "bg-amber-700/60"));
              } else if (currentNightSubPhase !== "act") {
                // We're in narrate / ponder / sleep / settle (or it's
                // the global opening). The action window hasn't opened
                // yet (or has already closed). Keep the actor listening.
                hint.textContent = "Listen to the moderator…";
              } else if (iAmBlocked) {
                hint.textContent =
                  "You were blocked tonight — your action won't land. Sit tight.";
              } else {
                hint.textContent =
                  myRole === "consort"
                    ? "Pick someone to block on the Players panel below."
                    : "Pick your target on the Players panel below.";
              }
            } else if (canActAtNight()) {
              hint.textContent =
                `${capitalize(currentNightRole)} is acting now. Your turn comes next (or later).`;
            } else {
              hint.textContent = "Eyes closed. The active role acts in secret.";
            }
            break;
          }

          case "day_discussion": {
            if (dayLynchResolved) {
              headline.textContent = "Day ends";
              if (iAmAlive) {
                hint.textContent = myIsHost
                  ? "When the room is ready, begin the next night."
                  : "The vote is in. Waiting for the host to begin the night.";
              } else {
                hint.textContent = "You're out. Waiting for the next night.";
              }
              if (myIsHost) {
                extras.appendChild(actionButton(
