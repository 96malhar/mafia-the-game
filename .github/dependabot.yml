version: 2
updates:
  # Go module dependencies (go.mod / go.sum).
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      # One PR per week for the usual minor/patch bumps to cut noise;
      # majors still get their own PRs so they're reviewed deliberately.
      go-minor-patch:
        update-types:
          - minor
          - patch

  # GitHub Actions used in .github/workflows/*.yml.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      actions-minor-patch:
        update-types:
          - minor
          - patch

  # Base images pinned by digest in the Dockerfile (golang, distroless).
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
